<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>인물 사전 - 노라온</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#ffffff;
    color:#000000;
    transition:0.3s;
}

.dark{
    background:#1e1e1e;
    color:#e0e0e0;
}

header{
    padding:20px;
    background:#444;
    color:white;
}

.container{
    display:flex;
}

.sidebar{
    width:200px;
    background:#f2f2f2;
    padding:20px;
    height:100vh;
    position:sticky;
    top:0;
}

.dark .sidebar{
    background:#2b2b2b;
}

.sidebar a{
    display:block;
    margin-bottom:10px;
    text-decoration:none;
    color:inherit;
}

.content{
    padding:20px;
    flex:1;
}

.profile{
    display:flex;
    gap:20px;
    margin-bottom:40px;
}

.profile img{
    width:150px;
    height:150px;
    object-fit:cover;
}

.ad{
    margin-top:60px;
    text-align:center;
}

.ad img{
    width:100%;
    max-width:800px;
}
</style>
</head>

<body>

<header>
<h1>노라온</h1>
<button onclick="toggleDark()">다크모드</button>
</header>

<div class="container">

<div class="sidebar">
<b>카테고리</b>
<a href="#overview">개요</a>
<a href="#feature">특징</a>
</div>

<div class="content">

<div class="profile">
<img src="https://via.placeholder.com/150" alt="임시 사진">

<div>
<p><b>이름:</b> 노라온</p>
<p><b>나이:</b> 만 15세</p>
<p><b>성별:</b> 키메라</p>
</div>
</div>

<h2 id="overview">개요</h2>
<p>
다음 글은 인물 노라온에 대한 설명을 담은 글이다.
</p>

<h2 id="feature">특징</h2>
<p>
평일에는 기숙사에서 생활하며 주말에 탈출해 트릭컬에 시간을 쏟는 삶을 산다.
</p>

<div class="ad">
<img src="https://via.placeholder.com/800x120" alt="광고 배너">
</div>

</div>
</div>

<script>
function toggleDark(){
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
