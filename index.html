<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>노라온 - 인물 사전</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: "Pretendard", Arial, sans-serif;
background:#f7f7f8;
color:#222;
display:flex;
transition:0.25s;
}

/* 사이드바 */

.sidebar{
width:220px;
height:100vh;
background:white;
border-right:1px solid #e6e6e6;
padding:25px;
position:sticky;
top:0;
}

.sidebar h2{
font-size:18px;
margin-bottom:20px;
}

.sidebar a{
display:block;
text-decoration:none;
color:#555;
padding:8px 0;
font-size:14px;
}

.sidebar a:hover{
color:#000;
}

/* 메인 영역 */

.main{
flex:1;
padding:40px;
max-width:900px;
margin:auto;
}

/* 상단 */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.topbar h1{
font-size:28px;
}

button{
border:none;
background:#eeeeee;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

/* 프로필 카드 */

.profile{
display:flex;
gap:20px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
margin-bottom:40px;
}

.profile img{
width:120px;
height:120px;
border-radius:10px;
object-fit:cover;
}

.profile-info p{
margin-bottom:6px;
font-size:14px;
}

/* 카테고리 */

.section{
margin-bottom:35px;
}

.section h2{
font-size:20px;
margin-bottom:10px;
border-bottom:1px solid #eee;
padding-bottom:6px;
}

.section p{
line-height:1.6;
color:#444;
}

/* 광고 */

.ad{
margin-top:60px;
text-align:center;
}

.ad img{
width:100%;
max-width:720px;
border-radius:10px;
}

/* 다크모드 */

.dark{
background:#1e1f22;
color:#e5e5e5;
}

.dark .sidebar{
background:#25262a;
border-color:#333;
}

.dark .profile{
background:#2a2b2f;
}

.dark button{
background:#333;
color:white;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>카테고리</h2>

<a href="#overview">개요</a>
<a href="#feature">특징</a>

</div>


<div class="main">

<div class="topbar">
<h1>노라온</h1>
<button onclick="toggleDark()">다크모드</button>
</div>


<div class="profile">

<img src="sadf.png">

<div class="profile-info">
<p><b>이름</b> : 노라온</p>
<p><b>나이</b> : 만 15세</p>
<p><b>성별</b> : 키메라</p>
</div>

</div>


<div class="section" id="overview">
<h2>개요</h2>
<p>다음 글은 인물 노라온에 대한 설명을 담은 글이다.</p>
</div>


<div class="section" id="feature">
<h2>특징</h2>
<p>평일에는 기숙사에서 생활하며 주말에 탈출해 트릭컬에 시간을 쏟는 삶을 산다.</p>
</div>


<div class="ad">
<img src="rao.png">
</div>


</div>

<script>

function toggleDark(){
document.body.classList.toggle("dark")
}

</script>

</body>
</html>
